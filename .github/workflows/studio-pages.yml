# Publishes the Studio (and the experience) to GitHub Pages on every push.
# The Studio is the Creative Director's canonical review surface:
# https://jla22492.github.io/lazy-a/studio/
name: studio-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Remove development-only routes
        run: rm -rf app/api app/studio/progress
      - name: Serve progress captures as static assets
        run: mkdir -p public/studio/progress && find docs/progress -maxdepth 1 -type f -exec cp {} public/studio/progress/ \;
      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          PAGES_BASE_PATH: ""
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
